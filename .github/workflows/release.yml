name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish self-contained
        shell: pwsh
        run: |
          dotnet publish src/AskShot.Client/AskShot.Client.csproj `
            -c Release -o publish/AskShot-${{ github.ref_name }} `
            --self-contained -r win-x64

      - name: Copy Python service
        shell: pwsh
        run: |
          Copy-Item -Recurse services publish/AskShot-${{ github.ref_name }}/services

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish/AskShot-${{ github.ref_name }} `
            -DestinationPath publish/AskShot-${{ github.ref_name }}.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/AskShot-${{ github.ref_name }}.zip
          generate_release_notes: true
